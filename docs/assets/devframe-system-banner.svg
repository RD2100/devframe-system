<svg width="1200" height="330" viewBox="0 0 1200 330" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">devframe-system banner</title>
  <desc id="desc">GPT Web as an external brain coordinating software tools and coding agents.</desc>
  <defs>
