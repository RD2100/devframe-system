    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="16" stdDeviation="18" flood-color="#1f3b57" flood-opacity="0.16"/>
    </filter>
  </defs>
  <rect width="1200" height="330" rx="18" fill="url(#bg)"/>
  <g opacity="0.55">
