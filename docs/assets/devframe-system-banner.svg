  <text x="144" y="172" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="25" fill="#24506b">GPT Web as an External Brain</text>
  <text x="144" y="214" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="20" fill="#45697f">Raise code quality. Keep direction. Coordinate every agent.</text>
